$hypr = ~/.config/hypr
$hl = $hypr/hyprland
$cConf = ~/.config/caelestia

# Variables (colours + other vars)
exec = cp -L --no-preserve=mode --update=none $hypr/scheme/default.conf $hypr/scheme/current.conf
source = $hypr/scheme/current.conf
source = $hypr/variables.conf

# User variables
exec = mkdir -p $cConf && touch -a $cConf/hypr-vars.conf
source = $cConf/hypr-vars.conf

env = QT_QPA_PLATFORM=xcb

xwayland:force_zero_scaling = true


# Laptop Default monitor conf
monitor = , preferred, auto, 1
monitorv2 {
	output = eDP-1
	mode = 2880x1800@120
	position = 0x0
	scale = 1.6
	#bitdepth = 10
	#supports_hdr = 1
	#supports_wide_color = 1
	#sdr_min_luminance = 0.005
	#sdr_max_luminance = 400
	#cm = hdr
}

monitorv2 {
  output = DP-4
  mode = 3840x2160
  position = -1920x0
  scale = 2
}
monitorv2 {
  output = DP-6
  mode = 3840x2160
  position = 0x-1080
  scale = 2
}

# Desktop Monitor config
monitorv2 {
	output = DP-1
	mode = 2560x1440@240
	position = 0x0
	scale = 1
#	bitdepth = 10
#	supports_hdr = 1
#	supports_wide_color = 1
#	sdr_min_luminance = 0.005
#	sdr_max_luminance = 300
#	cm = hdr
}
monitorv2 {
	output = DP-2
	mode = 2560x1440@180
	position = 2560x0
	scale = 1
	bitdepth = 10
	supports_hdr = 1
	supports_wide_color = 1
	sdr_min_luminance = 0.005
	sdr_max_luminance = 300
	cm = hdr
}

# Configs
source = $hl/env.conf
source = $hl/general.conf
source = $hl/input.conf
source = $hl/misc.conf
source = $hl/animations.conf
source = $hl/decoration.conf
source = $hl/group.conf
source = $hl/execs-noctalia.conf
source = $hl/rules-noctalia.conf
source = $hl/gestures.conf
source = $hl/keybinds-noctalia.conf

# User configs
exec-once = systemctl --user start hyprpolkitagent
exec = mkdir -p $cConf && touch -a $cConf/hypr-user.conf
source = $cConf/hypr-user.conf
